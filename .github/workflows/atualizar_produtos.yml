name: Executar Robo da Shopee

on:
  schedule:
    # Este comando (Cron) faz o script rodar automaticamente todos os dias à meia-noite (00:00 UTC)
    - cron: '0 0 * * *'
  workflow_dispatch: # Este comando permite que você ative o robô manualmente pelo botão no site do GitHub

jobs:
  cron_job:
    runs-on: ubuntu-latest

    steps:
    - name: Copiar os arquivos do repositorio
      uses: actions/checkout@v3

    - name: Configurar o Python no servidor do GitHub
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar as bibliotecas necessárias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Executar o script de Inteligência Financeira
      run: python app.py