    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bg-color: #121212;
            --text-color: #f8f9fa;
            --header-bg: #1359ee48;
            --card-bg: #2d2d2d;
            --card-border: #444444;
            --button-bg: #0d6efd;
            --button-text: #ffffff;
            --nav-bg: #343a40;
            --nav-text: #f8f9fa;
            --primary-color: #ff6b35;
            --secondary-color: #ff3535;
            --tertiary-color: #35a2ff;
            --quaternary-color: #35ff6b;
            --quinary-color: #ffd700;
            --font-primary: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
 
        /* REMOVIDO O USER-SELECT:NONE DO * PARA MELHORAR ACESSIBILIDADE E SEO */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
 
        body {
            font-family: var(--font-primary);
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.4;
            min-height: 100vh;
            /* PERFORMANCE: Removido o bg.gif global pesado que destruía a renderização */
        }
 
        header {
            background-color: var(--header-bg);
            height: 60px;
            padding: 0 1rem;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.164);
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 3px solid var(--primary-color);
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        /* CORREÇÃO DO H2: Estilização do novo título semântico */
        .section-title {
            text-align: center;
            margin: 2rem 0 0;
            font-size: 1.6rem;
            color: var(--text-color);
            font-weight: 600;
        }
 
        .ads-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            padding: 1.5rem 1rem;
        }
 
        .ad-container {
            background-color: #000000;
            border: 2px solid var(--card-border);
            border-radius: 12px;
            height: 480px;
            overflow: hidden;
            /* PERFORMANCE: Transição aplicada estritamente onde precisa, em vez do '*' */
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
        }
 
        .ad-container:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(255, 107, 53, 0.3);
            border-color: var(--primary-color);
        }
 
        .ad-link {
            text-decoration: none;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .product-image-wrap {
            width: 100%;
            height: 65%;
            background-color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            border-bottom: 1px solid var(--card-border);
        }

        .product-image-wrap img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
 
        .product-info-wrap {
            width: 100%;
            height: 35%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            background-color: #000000;
            padding: 12px;
            gap: 6px;
        }
 
        .product-title {
            color: #ffffff;
            font-weight: bold;
            font-size: 0.95rem;
            text-align: center;
            width: 100%;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.2;
            height: 2.4em;
        }
 
        .product-price {
            color: var(--primary-color);
            font-size: 1.5rem;
            font-weight: bold;
            margin: 0;
            line-height: 1;
        }
 
        .product-description {
            color: #bbbbbb;
            font-size: 0.8rem;
            margin: 0;
            font-weight: normal;
            text-align: center;
            width: 100%;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.2;
            height: 3.6em;
        }
 
        .loading {
            text-align: center;
            padding: 4rem 2rem;
            font-size: 1.5rem;
            color: var(--quinary-color);
            grid-column: 1 / -1;
        }
 
        footer {
            text-align: center;
            padding: 2rem 1rem;
            margin-top: 2rem;
            border-top: 2px solid var(--secondary-color);
            font-size: 0.9rem;
            color: #888888;
        }
 
        @media (max-width: 600px) {
            .ads-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
            .ad-container {
                height: 450px;
            }
        }
    </style>

<body>
    <header>
        <h1 class="sr-only">Power Store 2 - Melhores Achados e Promoções Shopee</h1>
        <img src="./image/plog.png" alt="Logo Power Store - Achados Shopee" style="height: 40px; width: auto;">
    </header>
 
    <main class="container">
        <h2 class="section-title">🔥 Achados em Destaque do Dia</h2>
        
        <div class="ads-grid" id="adsGrid">
            <div class="loading">🔍 Carregando ofertas Shopee...</div>
        </div>
    </main>
 
    <footer>
        <p>© 2026 Power Store 2. Todos os direitos reservados erbj.</p>
    </footer>
 
    <script>
        const SUPABASE_URL = "https://vzpzbjnakzbnkksfpatl.supabase.co";
        const SUPABASE_KEY = "sb_publishable_MezbGHiL8dv5qGqWX-ZikQ_GNmJ7TAk";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
 
        // SEGURANÇA (Anti-XSS): Função para impedir que códigos maliciosos injetados quebrem seu site
        function escaparHTML(string) {
            if (!string) return '';
            return string
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        async function buscarProdutos() {
            const { data: produtos, error } = await _supabase
                .from('produtos')
                .select('*')
                .order('preco', { ascending: true });
 
            if (error) {
                console.error("Erro ao buscar produtos:", error);
                document.getElementById('adsGrid').innerHTML =
                    '<div class="loading">❌ Erro ao carregar ofertas. Tente novamente.</div>';
                return;
            }
 
            renderShopeeAds(produtos);
        }
 
        function renderShopeeAds(lista) {
            const adsGrid = document.getElementById('adsGrid');
 
            if (!lista || lista.length === 0) {
                adsGrid.innerHTML = '<div class="loading">📭 Nenhuma oferta disponível.</div>';
                return;
            }
 
            let htmlContent = '';
 
            lista.forEach((prod) => {
                const bannerImg   = prod.imagem_url   || './image/favicon.png';
                
                // Aplicando higienização de strings para proteção contra invasões
                const titulo      = escaparHTML(prod.titulo || 'Produto').toUpperCase();
                const descricao   = escaparHTML(prod.descricao || '');
                const link        = prod.link_afiliado || '#';
                
                const precoRender = prod.preco != null
                    ? `<p class="product-price">R$ ${prod.preco.toFixed(2).replace('.', ',')}</p>`
                    : '';
 
                const descRender = descricao
                    ? `<p class="product-description">${descricao}</p>`
                    : '<div style="height:3.6em;"></div>';
 
                // CORE WEB VITALS: Adicionado loading="lazy", width e height fixos na imagem para evitar oscilações de layout (CLS)
                htmlContent += `
                <article class="ad-container">
                    <a href="${link}" target="_blank" rel="sponsored noopener" class="ad-link">
 
                        <div class="product-image-wrap">
                            <img src="${bannerImg}" alt="Achado Shopee: ${titulo}"
                                 loading="lazy" width="300" height="300"
                                 onerror="this.closest('.ad-container').remove()">
                        </div>
 
                        <div class="product-info-wrap">
                            <div style="width:100%;">
                                <h3 class="product-title">🛍️ ${titulo}</h3>
                            </div>
                            ${precoRender}
                            ${descRender}
                        </div>
                    </a>
                </article>`;
            });
 
            adsGrid.innerHTML = htmlContent;
        }
 
        buscarProdutos();
    </script>
 
    <script>
        const THEMES = ['dark', 'light', 'purple', 'green'];
        let currentThemeIndex = 0;
 
        function loadTheme() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            currentThemeIndex = THEMES.indexOf(savedTheme);
            if (currentThemeIndex === -1) currentThemeIndex = 0;
            document.documentElement.setAttribute('data-theme', THEMES[currentThemeIndex]);
        }
 
        loadTheme();
    </script>
 
    <script>
        document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || e.keyCode === 123) {
                e.preventDefault();
                return false;
            }
        });
    </script>
</body>
</html>
