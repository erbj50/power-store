<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",

    <link rel="icon" type="image/png" sizes="96x96" href="https://deo.shopeemobile.com/shopee/shopee-pcmall-live-sg/assets/icon_favicon_1_96.1ce0e05fc18a86e5.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="icon" href="./image/favicon.png" type="image/png">
 
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #f8f9fa;
            --header-bg: #1359ee48;
            --card-bg: #000000;
            --card-border: #444444;
            --primary-color: #ff6b35; /* Laranja Power */
            --secondary-color: #ff3535;
            --tertiary-color: #35a2ff;
            --quaternary-color: #35ff6b;
            --quinary-color: #ffd700; /* Amarelo Ouro */
            --font-primary: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
 
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
 
        body {
            font-family: var(--font-primary);
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.4;
            min-height: 100vh;
        }
 
        header {
            background-color: var(--header-bg);
            height: 60px;
            padding: 0 1rem;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.164);
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 3px solid var(--primary-color);
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
 
        .section-title {
            text-align: center;
            margin: 2rem 0 0;
            font-size: 1.6rem;
            color: var(--text-color);
            font-weight: 600;
        }
 
        .ads-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            padding: 1.5rem 1rem;
        }
 
        /* O CONTAINER DO CARD MANTÉM O TAMANHO PADRÃO */
        .ad-container {
            background-color: var(--card-bg);
            border: 2px solid var(--card-border);
            border-radius: 12px;
            height: 480px;
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
        }
 
        .ad-container:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(255, 107, 53, 0.3);
            border-color: var(--primary-color);
        }
 
        .ad-link {
            text-decoration: none;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* 75% DE ESPAÇO PARA VALORIZAR A IMAGEM */
        .product-image-wrap {
            width: 100%;
            height: 75%;
            background-color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ZOOM INTELIGENTE QUE SE ADAPTA PERFEITAMENTE SEM ESPAÇOS VAZIOS */
        .product-image-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scale(1.03);
            transition: transform 0.3s ease;
        }

        .ad-container:hover .product-image-wrap img {
            transform: scale(1.10);
        }
 
        /* 25% DE TEXTO (MARGEM PRETA TOTALMENTE OTIMIZADA E REDUZIDA) */
        .product-info-wrap {
            width: 100%;
            height: 25%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            gap: 2px;
        }
 
        .product-title {
            color: #ffffff;
            font-weight: bold;
            font-size: 0.9rem;
            text-align: center;
            width: 100%;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.2;
        }

        /* LINHA DE BAIXO COMPACTA COM PREÇO E O IDENTIFICADOR DO CARD */
        .product-footer-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-top: auto;
            padding-top: 2px;
        }
 
        .product-price {
            color: var(--quinary-color); /* Amarelo Ouro destacado no fundo preto */
            font-size: 1.3rem;
            font-weight: bold;
            margin: 0;
            line-height: 1;
        }

        /* ETIQUETA SINALIZADORA DE IDENTIFICAÇÃO DO CARD */
        .card-id-badge {
            background: var(--primary-color);
            color: #ffffff;
            font-size: 0.75rem;
            font-weight: bold;
            padding: 3px 8px;
            border-radius: 6px;
            border: 1px solid #ffffff;
            box-shadow: 0 0 8px rgba(255, 107, 53, 0.5);
        }
 
        .loading {
            text-align: center;
            padding: 4rem 2rem;
            font-size: 1.5rem;
            color: var(--quinary-color);
            grid-column: 1 / -1;
        }
 
        footer {
            text-align: center;
            padding: 2rem 1rem;
            margin-top: 2rem;
            border-top: 2px solid var(--secondary-color);
            font-size: 0.9rem;
            color: #888888;
        }

        /* BARRA SUSPENSA TOTALMENTE PERSISTENTE E EXCLUSIVA PARA SMARTPHONES */
        .sticky-mobile-bar {
            display: none;
        }
 
        @media (max-width: 600px) {
            .ads-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
            .ad-container {
                height: 480px;
            }

            /* Ativação da barra suspensa flutuante na tela mobile */
            .sticky-mobile-bar {
                display: block;
                position: fixed;
                bottom: 20px;
                left: 5%;
                width: 90%;
                height: 60px;
                background-color: #1358ee2f; /* Fundo Azul */
                border: 2px solid var(--primary-color); /* Borda Laranja */
                border-radius: 8px;
                z-index: 9999;
                box-shadow: 0 4px 15px rgba(6, 9, 206, 0.342);
            }

            .sticky-bar-container {
                display: flex;
                justify-content: space-between;
                align-items: center;
                height: 100%;
                padding: 0 15px;
            }

            .sticky-controls {
                display: flex;
                gap: 10px;
                align-items: center;
            }

            /* Seletor de roleta nativo que abre o disco de números ao toque */
            #cardPositionInput {
                width: 85px;
                height: 38px;
                background: #0000008a;
                border: 2px solid var(--quinary-color);
                color: #ffffff;
                text-align: center;
                font-size: 1.1rem;
                border-radius: 6px;
                font-weight: bold;
                padding: 0 5px;
                cursor: pointer;
                outline: none;
            }

            .sticky-bar-logo {
                height: 30px;
                width: auto;
            }
        }
    </style>
</head>
 
<body>
    <header>
        <h1 class="sr-only">Power Store 2 - Melhores Achados e Promoções</h1>
        <img src="./image/plog.png" alt="Logo Power Store - Achados" style="height: 40px; width: auto;">
    </header>
 
    <main class="container">
        <h2 class="section-title"> Achados em Destaque do Dia🔥</h2>
        
        <div class="ads-grid" id="adsGrid">
            <div class="loading">🔍 Carregando ofertas...</div>
        </div>
    </main>
 
    <div id="stickySelectorBar" class="sticky-mobile-bar">
        <div class="sticky-bar-container">
            <div class="sticky-controls">
                <select id="cardPositionInput" onchange="irParaCardAutomatico()">
                    <option value="1"># 1</option>
                </select>
                <span style="font-size: 0.85rem; color: #ffffff; font-weight: bold;">IR PARA O CARD</span>
            </div>
            <img src="./image/plog.png" alt="Power Logo" class="sticky-bar-logo">
        </div>
    </div>

    <footer>
        <p>© 2026 Power Store 2. Todos os direitos reservados erbj.</p>
    </footer>
 
   <script>
        const SUPABASE_URL = "https://vzpzbjnakzbnkksfpatl.supabase.co";
        const SUPABASE_KEY = "sb_publishable_MezbGHiL8dv5qGqWX-ZikQ_GNmJ7TAk";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
 
        // SEGURANÇA (Anti-XSS)
        function escaparHTML(string) {
            if (!string) return '';
            return string
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        async function buscarProdutos() {
            const { data: produtos, error } = await _supabase
                .from('produtos')
                .select('*')
                .order('preco', { ascending: true });
 
            if (error) {
                console.error("Erro ao buscar produtos:", error);
                document.getElementById('adsGrid').innerHTML =
                    '<div class="loading">❌ Erro ao carregar ofertas. Tente novamente.</div>';
                return;
            }
 
            renderShopeeAds(produtos);
        }
 
        function renderShopeeAds(lista) {
            const adsGrid = document.getElementById('adsGrid');
            const seletorLista = document.getElementById('cardPositionInput');
 
            if (!lista || lista.length === 0) {
                adsGrid.innerHTML = '<div class="loading">📭 Nenhuma oferta disponível.</div>';
                return;
            }
 
            let htmlContent = '';
            let seletorOptions = ''; 
 
            lista.forEach((prod, index) => {
                const numeroDoCard = index + 1;
                const bannerImg   = prod.imagem_url   || './image/favicon.png';
                const titulo      = escaparHTML(prod.titulo || 'Produto').toUpperCase();
                const link        = prod.link_afiliado || '#';
                
                const precoRender = prod.preco != null
                    ? `R$ ${prod.preco.toFixed(2).replace('.', ',')}`
                    : 'Grátis';
 
                // Alimenta dinamicamente as opções da roleta de rolagem com base no total de dados salvos
                seletorOptions += `<option value="${numeroDoCard}"># ${numeroDoCard}</option>`;
 
                // MONTAGEM DO CARD COM FOCO 75% NA IMAGEM E SINALIZAÇÃO DO CARD
                htmlContent += `
                <article class="ad-container" id="card-${numeroDoCard}">
                    <a href="${link}" target="_blank" rel="sponsored noopener" class="ad-link">
 
                        <div class="product-image-wrap">
                            <img src="${bannerImg}" alt="Achado Power Store: ${titulo}"
                                 loading="lazy" width="300" height="300"
                                 onerror="this.onerror=null; this.src='./image/favicon.png';">
                        </div>
 
                        <div class="product-info-wrap">
                            <div style="width:100%;">
                                <h3 class="product-title">🛍️ ${titulo}</h3>
                            </div>
                            
                            <div class="product-footer-row">
                                <p class="product-price">${precoRender}</p>
                                <span class="card-id-badge">CARD ${numeroDoCard}</span>
                            </div>
                        </div>
                    </a>
                </article>`;
            });
 
            adsGrid.innerHTML = htmlContent;

            // Injeta as opções numéricas geradas na roleta da barra mobile
            if (seletorLista) {
                seletorLista.innerHTML = seletorOptions;
            }
        }

        /* FUNÇÃO DE SISTEMA: Intercepta a seleção da roleta, fecha o painel e faz o scroll suave até o alvo */
        function irParaCardAutomatico() {
            const seletor = document.getElementById('cardPositionInput');
            const posicaoSelecionada = seletor.value;
            const elementoAlvo = document.getElementById(`card-${posicaoSelecionada}`);
            
            if (elementoAlvo) {
                // Executa a rolagem automática centralizando milimetricamente o card na tela do celular
                elementoAlvo.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }
 
        buscarProdutos();
    </script>
</body>
</html>
